# Elvis lint + eunit for hecate-warden.
#
# Codeberg is canonical; this runs on the GitHub push-mirror (Forgejo Actions
# disabled per the migration pattern). Keeps the org's structural rules honest:
# no deep nesting (max one meaningful level), no nested try/catch, no if.
name: lint-and-test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    container:
      image: erlang:27
    steps:
      - uses: actions/checkout@v4
      - name: Elvis lint
        run: rebar3 lint
      - name: EUnit
        run: rebar3 eunit
